  <g filter="url(#iconGlowPremium)">
    <path d="M333 197L268 260L333 323" stroke="url(#codeGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M461 197L526 260L461 323" stroke="url(#codeGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

      <stop offset="0.5" stop-color="#31E786"/>
      <stop offset="1" stop-color="#00B8A9"/>
    </linearGradient>
    <linearGradient id="devGradient" x1="952" y1="196" x2="1212" y2="340" gradientUnits="userSpaceOnUse">

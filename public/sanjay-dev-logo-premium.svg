  <rect width="1600" height="520" rx="40" fill="#010302"/>
  <circle cx="386" cy="261" r="110" fill="#34E882" fill-opacity="0.12"/>
  <circle cx="1140" cy="256" r="112" fill="#2BDA77" fill-opacity="0.1"/>

